<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Style Engine - 1000+ Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Michroma&family=Exo+2:wght@300;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-color: #00d2ff;
            --secondary-color: #ff007f;
            --bg-dark: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Exo 2', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            /* аҰ…аҰҹа§Ӣ аҰ•аҰҫаҰІаҰҫаҰ° аҰҡа§ҮаҰһа§ҚаҰң аҰҸаҰЁаҰҝаҰ®а§ҮаҰ¶аҰЁ */
            animation: colorShift 20s infinite alternate;
        }

        @keyframes colorShift {
            0% { --neon-color: #00d2ff; --secondary-color: #ff007f; }
            33% { --neon-color: #00ff88; --secondary-color: #00d2ff; }
            66% { --neon-color: #ffcc00; --secondary-color: #ff007f; }
            100% { --neon-color: #ff007f; --secondary-color: #00ff88; }
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            opacity: 0.6;
        }

        header {
            padding: 50px 20px;
            text-align: center;
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 8vw, 5rem);
            font-weight: 900;
            text-transform: uppercase;
            color: white;
            text-shadow: 0 0 20px var(--neon-color);
            letter-spacing: 5px;
            transition: 0.5s;
        }

        .main-engine {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .control-panel {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            margin-bottom: 50px;
        }

        .input-wrapper {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--neon-color);
            border-radius: 20px;
            padding: 10px;
            backdrop-filter: blur(15px);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            transition: 0.5s;
        }

        .input-wrapper input {
            width: 100%;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1.5rem;
            padding: 15px;
            font-family: 'Michroma', sans-serif;
            outline: none;
            text-align: center;
        }

        .gen-btn {
            width: 100%;
            max-width: 500px;
            background: linear-gradient(45deg, var(--neon-color), var(--secondary-color));
            color: #fff;
            border: none;
            padding: 20px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1.4rem;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
            font-family: 'Orbitron', sans-serif;
            box-shadow: 0 5px 25px rgba(0,0,0,0.5);
        }

        .gen-btn:hover {
            transform: scale(1.02);
            filter: brightness(1.2);
            box-shadow: 0 0 40px var(--neon-color);
        }

        .results-grid {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .style-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            transition: 0.3s;
            animation: slideIn 0.5s ease-out forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .style-card:hover {
            border-color: var(--neon-color);
            background: rgba(255, 255, 255, 0.07);
        }

        .styled-name {
            font-size: 1.8rem;
            display: block;
            margin-bottom: 20px;
            color: #fff;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        .copy-trigger {
            background: transparent;
            border: 1px solid var(--neon-color);
            color: var(--neon-color);
            padding: 10px 40px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .copy-trigger:hover {
            background: var(--neon-color);
            color: #000;
        }

        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--secondary-color);
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: bold;
            display: none;
            z-index: 1000;
        }

        footer {
            text-align: center;
            padding: 60px;
            opacity: 0.5;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<div id="toast">COPIED SUCCESSFULLY!</div>

<header>
    <h1>ULTRA ENGINE</h1>
    <p style="color: var(--neon-color)">1000+ UNIQUE STYLES & DYNAMIC COLORS</p>
</header>

<div class="main-engine">
    <div class="control-panel">
        <div class="input-wrapper">
            <input type="text" id="targetInput" placeholder="TYPE YOUR NAME..." maxlength="30">
        </div>
        <button class="gen-btn" onclick="generateInfinityStyles()">GENERATE 1000+ STYLES</button>
    </div>

    <div class="results-grid" id="resultContainer"></div>
</div>

<footer>&copy; 2026 NEXUS GRAPHICS STUDIO</footer>

<script>
    // Particle Animation
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function initCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2;
            this.vX = Math.random() * 1 - 0.5;
            this.vY = Math.random() * 1 - 0.5;
        }
        update() {
            this.x += this.vX; this.y += this.vY;
            if(this.x < 0 || this.x > canvas.width) this.vX *= -1;
            if(this.y < 0 || this.y > canvas.height) this.vY *= -1;
        }
        draw() {
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
        }
    }

    window.addEventListener('resize', initCanvas);
    initCanvas();
    for(let i=0; i<100; i++) particles.push(new Particle());

    function animate() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }
    animate();

    // 1000+ Styles Logic
    const fontMaps = [
        {'a':'рқ”ё','b':'рқ”№','c':'в„Ӯ','d':'рқ”»','e':'рқ”ј','f':'рқ”Ҫ','g':'рқ”ҫ','h':'в„Қ','i':'рқ•Җ','j':'рқ•Ғ','k':'рқ•Ӯ','l':'рқ•ғ','m':'рқ•„','n':'в„•','o':'рқ•Ҷ','p':'в„ҷ','q':'в„ҡ','r':'в„қ','s':'рқ•Ҡ','t':'рқ•Ӣ','u':'рқ•Ң','v':'рқ•Қ','w':'рқ•Һ','x':'рқ•Ҹ','y':'рқ•җ','z':'в„Ө'},
        {'a':'рқ“җ','b':'рқ“‘','c':'рқ“’','d':'рқ““','e':'рқ“”','f':'рқ“•','g':'рқ“–','h':'рқ“—','i':'рқ“ҳ','j':'рқ“ҷ','k':'рқ“ҡ','l':'рқ“ӣ','m':'рқ“ң','n':'рқ“қ','o':'','p':'рқ“ҹ','q':'рқ“ ','r':'рқ“Ў','s':'рқ“ў','t':'рқ“Ј','u':'рқ“Ө','v':'рқ“Ҙ','w':'рқ“Ұ','x':'рқ“§','y':'рқ“Ё','z':'рқ“©'},
        {'a':'еҚӮ','b':'д№ғ','c':'еҢҡ','d':'б—Ә','e':'д№Ү','f':'еҚғ','g':'бҺ¶','h':'еҚ„','i':'дёЁ','j':'пҫҢ','k':'Тң','l':'г„Ҙ','m':'зҲӘ','n':'еҮ ','o':'г„–','p':'еҚ©','q':'ЙҠ','r':'е°ә','s':'дёӮ','t':'г„’','u':'г„©','v':'бҗҜ','w':'еұұ','x':'д№Ӯ','y':'г„ҡ','z':'д№ҷ'},
        {'a':'Оұ','b':'РІ','c':'Вў','d':'вҲӮ','e':'С”','f':'Ж’','g':'g','h':'РҪ','i':'О№','j':'Ч ','k':'Рә','l':'в„“','m':'Рј','n':'О·','o':'Пғ','p':'ПҒ','q':'ХҰ','r':'СҸ','s':'С•','t':'СӮ','u':'П…','v':'ОҪ','w':'Пү','x':'ПҮ','y':'Сғ','z':'z'},
        {'a':'в“җ','b':'в“‘','c':'в“’','d':'в““','e':'в“”','f':'в“•','g':'в“–','h':'в“—','i':'в“ҳ','j':'в“ҷ','k':'в“ҡ','l':'в“ӣ','m':'в“ң','n':'в“қ','o':'в“һ','p':'в“ҹ','q':'в“ ','r':'в“Ў','s':'в“ў','t':'в“Ј','u':'в“Ө','v':'в“Ҙ','w':'в“Ұ','x':'в“§','y':'в“Ё','z':'в“©'}
    ];

    const decorStarts = ["к§Ғај’", "вҡ”пёҸк§Ғ", "рҹ”ұајә", "рҹ‘‘к§Ғ", "вҡЎгҖҺ", "рҹ’Һајә", "рҹ”Ҙв—Ҙ", "в–‘в–’в–“", "рҹ’ вңЁ", "вҳ пёҸвӣ“пёҸ", "вқғвқӮ", "вӮӘвӮӘвӮӘ", "в—ўв—Ө", "гғҹвҳ…", "гҖҺрҹ”ұгҖҸ", "гҖҗвҳ…гҖ‘", "ајәвҷӣ", "в—Ҙв—Ј"];
    const decorEnds = ["ај’к§Ӯ", "к§Ӯвҡ”пёҸ", "ај»рҹ”ұ", "к§Ӯрҹ‘‘", "гҖҸвҡЎ", "ај»рҹ’Һ", "в—Өрҹ”Ҙ", "в–“в–’в–‘", "вңЁрҹ’ ", "вӣ“пёҸвҳ пёҸ", "вқӮвқғ", "вӮӘвӮӘвӮӘ", "в—Ҙв—Ј", "вҳ…еҪЎ", "гҖҺрҹ”ұгҖҸ", "гҖҗвҳ…гҖ‘", "вҷӣај»", "в—ўв—Ө"];

    function generateInfinityStyles() {
        const name = document.getElementById("targetInput").value.trim() || "ZASIM PRO";
        const container = document.getElementById("resultContainer");
        container.innerHTML = "";

        // аҰңа§ҮаҰЁаҰҫаҰ°а§ҮаҰҹаҰ° аҰІаҰңаҰҝаҰ• аҰҜаҰҫ а§§а§Ұа§Ұа§Ұ+ аҰ•аҰ®а§ҚаҰ¬аҰҝаҰЁа§ҮаҰ¶аҰЁ аҰӨа§ҲаҰ°аҰҝ аҰ•аҰ°аҰ¬а§Ү
        for (let i = 0; i < 1000; i++) {
            let font = fontMaps[i % fontMaps.length];
            let start = decorStarts[Math.floor(Math.random() * decorStarts.length)];
            let end = decorEnds[Math.floor(Math.random() * decorEnds.length)];
            
            let styledText = name.split('').map(c => font[c.toLowerCase()] || c).join('');
            let final = `${start} ${styledText} ${end}`;

            const card = document.createElement("div");
            card.className = "style-card";
            card.innerHTML = `
                <span class="styled-name">${final}</span>
                <button class="copy-trigger" onclick="copyName('${final}')">COPY STYLE</button>
            `;
            container.appendChild(card);
        }
    }

    function copyName(text) {
        if (navigator.clipboard) {
            navigator.clipboard.writeText(text).then(() => showToast());
        } else {
            let t = document.createElement("textarea"); t.value = text;
            document.body.appendChild(t); t.select(); document.execCommand('copy');
            document.body.removeChild(t); showToast();
        }
    }

    function showToast() {
        const t = document.getElementById("toast");
        t.style.display = "block";
        setTimeout(() => t.style.display = "none", 2000);
    }

    window.onload = () => {
        document.getElementById("targetInput").value = "PRO ZASIM";
        generateInfinityStyles();
    };
</script>

</body>
</html>
